<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter+Tight:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap');

.elementor-widget-html { margin: 0 !important; padding: 0 !important; }
.elementor-widget-container { margin: 0 !important; padding: 0 !important; }

/* ── Section wrapper ── */
.mt-logos {
  --navy: #07162E;
  --accent: #4C7BF4;
  --accent2: #7B5CF5;
  --beige: #D4C5B0;
  --card: rgba(255, 255, 255, 0.035);
  --card-hover: rgba(255, 255, 255, 0.07);
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(100, 140, 255, 0.35);
  --glow: rgba(80, 120, 255, 0.12);
  background: var(--navy);
  padding: 80px 0 100px;
  font-family: 'Inter', sans-serif;
  position: relative;
  overflow: hidden;
}

.mt-logos *,
.mt-logos *::before,
.mt-logos *::after {
  box-sizing: border-box;
}

.mt-logos::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(76,123,244,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 50%, rgba(56,163,244,0.03) 0%, transparent 50%);
  pointer-events: none;
}

.mt-logos-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
  position: relative;
  z-index: 2;
}

/* ── Header ── */
.mt-logos-header {
  text-align: center;
  margin-bottom: 56px;
  opacity: 0;
  transform: translateY(30px);
}
.mt-logos-header.mt-vis { animation: mtLogoUp 0.8s ease forwards; }

.mt-logos-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Inter Tight', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}
.mt-logos-label::before,
.mt-logos-label::after {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--accent);
}

.mt-logos h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 600;
  color: #ffffff;
  margin: 0 0 16px;
  line-height: 1.15;
}
.mt-logos h2 em { font-style: italic; color: var(--beige); }

.mt-logos-subtitle {
  font-size: 16px;
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── Divider ── */
.mt-logos-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 0 auto 56px;
  opacity: 0;
}
.mt-logos-divider.mt-vis { animation: mtLogoUp 0.8s ease 0.1s forwards; }

/* ── Bento grid ── */
.mt-bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 88px);
  grid-template-areas:
    "a1  a1  a2  a3"
    "a4  a5  a6  a6"
    "a7  a8  a8  a9"
    "a10 a11 a12 a12"
    "a13 a13 a14 a15"
    "a16 a16 a16 a16";
  gap: 10px;
  max-width: 920px;
  margin: 0 auto;
}

.mt-c1  { grid-area: a1; }
.mt-c2  { grid-area: a2; }
.mt-c3  { grid-area: a3; }
.mt-c4  { grid-area: a4; }
.mt-c5  { grid-area: a5; }
.mt-c6  { grid-area: a6; }
.mt-c7  { grid-area: a7; }
.mt-c8  { grid-area: a8; }
.mt-c9  { grid-area: a9; }
.mt-c10 { grid-area: a10; }
.mt-c11 { grid-area: a11; }
.mt-c12 { grid-area: a12; }
.mt-c13 { grid-area: a13; }
.mt-c14 { grid-area: a14; }
.mt-c15 { grid-area: a15; }
.mt-c16 { grid-area: a16; }

/* ── Card ── */
.mt-bento-card {
  position: relative;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.45s cubic-bezier(0.25, 1, 0.5, 1);
  opacity: 0;
  transform: translateY(30px);
}

.mt-bento-card.mt-vis { animation: mtBentoReveal 0.6s ease-out forwards; }
.mt-bento-card:nth-child(1).mt-vis  { animation-delay: 0.04s; }
.mt-bento-card:nth-child(2).mt-vis  { animation-delay: 0.08s; }
.mt-bento-card:nth-child(3).mt-vis  { animation-delay: 0.12s; }
.mt-bento-card:nth-child(4).mt-vis  { animation-delay: 0.16s; }
.mt-bento-card:nth-child(5).mt-vis  { animation-delay: 0.20s; }
.mt-bento-card:nth-child(6).mt-vis  { animation-delay: 0.24s; }
.mt-bento-card:nth-child(7).mt-vis  { animation-delay: 0.28s; }
.mt-bento-card:nth-child(8).mt-vis  { animation-delay: 0.32s; }
.mt-bento-card:nth-child(9).mt-vis  { animation-delay: 0.36s; }
.mt-bento-card:nth-child(10).mt-vis { animation-delay: 0.40s; }
.mt-bento-card:nth-child(11).mt-vis { animation-delay: 0.44s; }
.mt-bento-card:nth-child(12).mt-vis { animation-delay: 0.48s; }
.mt-bento-card:nth-child(13).mt-vis { animation-delay: 0.52s; }
.mt-bento-card:nth-child(14).mt-vis { animation-delay: 0.56s; }
.mt-bento-card:nth-child(15).mt-vis { animation-delay: 0.60s; }
.mt-bento-card:nth-child(16).mt-vis { animation-delay: 0.64s; }

/* Glow follow cursor */
.mt-bento-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 11px;
  background: radial-gradient(
    250px circle at var(--mx, 50%) var(--my, 50%),
    var(--glow), transparent 70%
  );
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 1;
}

/* Gradient border on hover */
.mt-bento-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 11px;
  padding: 1px;
  background: linear-gradient(135deg,
    rgba(76, 123, 244, 0.45),
    rgba(123, 92, 245, 0.25),
    transparent 55%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.45s ease;
  pointer-events: none;
  z-index: 2;
}

.mt-bento-card:hover {
  background: var(--card-hover);
  border-color: var(--border-hover);
  transform: translateY(-3px) scale(1.01);
  box-shadow:
    0 16px 36px rgba(0, 0, 0, 0.3),
    0 0 36px rgba(76, 123, 244, 0.06);
}
.mt-bento-card:hover::after  { opacity: 1; }
.mt-bento-card:hover::before { opacity: 1; }

/* ── Logo inside card ── */
.mt-bento-logo {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  position: relative;
  z-index: 3;
}

.mt-bento-logo img {
  max-width: 60%;
  max-height: 38px;
  object-fit: contain;
  filter: brightness(0.55) grayscale(100%);
  opacity: 0.5;
  transition: all 0.45s cubic-bezier(0.25, 1, 0.5, 1);
}

.mt-bento-card:hover .mt-bento-logo img {
  filter: brightness(1) grayscale(0%);
  opacity: 1;
  transform: scale(1.06);
}

/* Logo placeholder (text, will be replaced with img when available) */
.mt-bento-logo-text {
  font-family: 'Inter Tight', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.5px;
  transition: all 0.45s ease;
  position: relative;
  z-index: 3;
  text-align: center;
  padding: 16px;
}
.mt-bento-card:hover .mt-bento-logo-text {
  color: rgba(255,255,255,0.85);
}

/* Shimmer line */
.mt-bento-shine {
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  z-index: 4;
  pointer-events: none;
}
.mt-bento-card:hover .mt-bento-shine {
  animation: mtShimmer 0.8s ease-out forwards;
}

/* ── Bottom tagline ── */
.mt-logos-tagline {
  text-align: center;
  margin-top: 48px;
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.5px;
  opacity: 0;
  transform: translateY(20px);
}
.mt-logos-tagline.mt-vis { animation: mtLogoUp 0.8s ease 0.35s forwards; }

/* ── Animations ── */
@keyframes mtLogoUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes mtBentoReveal {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes mtShimmer {
  to { left: 100%; }
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .mt-logos { padding: 60px 0 80px; }
  .mt-logos-inner { padding: 0 20px; }
  .mt-logos h2 { font-size: 36px; }
  .mt-bento-grid {
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: auto;
    grid-template-areas:
      "a1  a2"
      "a3  a4"
      "a5  a6"
      "a7  a8"
      "a9  a10"
      "a11 a12"
      "a13 a14"
      "a15 a16";
    grid-auto-rows: 78px;
    gap: 8px;
  }
  .mt-bento-card { border-radius: 9px; }
  .mt-bento-card::after { border-radius: 9px; }
  .mt-bento-card::before { border-radius: 9px; }
  .mt-bento-logo { padding: 12px; }
  .mt-bento-logo img { max-width: 68%; max-height: 32px; }
  .mt-bento-logo-text { font-size: 13px; }
}

@media (max-width: 480px) {
  .mt-logos { padding: 40px 0 60px; }
  .mt-logos-inner { padding: 0 16px; }
  .mt-logos h2 { font-size: 30px; }
  .mt-bento-grid { gap: 6px; grid-auto-rows: 68px; }
  .mt-bento-card { border-radius: 8px; }
  .mt-bento-card::after { border-radius: 8px; }
  .mt-bento-card::before { border-radius: 8px; }
  .mt-bento-logo { padding: 10px; }
  .mt-bento-logo img { max-width: 74%; max-height: 28px; }
  .mt-bento-logo-text { font-size: 11px; }
}
</style>

<script>
(function(){
  /* Mouse glow follow */
  document.querySelectorAll('.mt-bento-card').forEach(function(c){
    c.addEventListener('mousemove', function(e){
      var r = c.getBoundingClientRect();
      c.style.setProperty('--mx', (e.clientX - r.left) + 'px');
      c.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
  });

  /* IntersectionObserver */
  if('IntersectionObserver' in window){
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('mt-vis'); obs.unobserve(e.target); }
      });
    }, {threshold: 0.08});
    document.querySelectorAll('#mtLogosHeader, #mtLogosDivider, .mt-bento-card, #mtLogosTagline').forEach(function(el){ obs.observe(el); });
  } else {
    document.querySelectorAll('#mtLogosHeader, #mtLogosDivider, .mt-bento-card, #mtLogosTagline').forEach(function(el){ el.classList.add('mt-vis'); });
  }
})();
</script>
